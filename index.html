<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"><meta http-equiv="Pragma" content="no-cache"><meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a6e5c">
<title>寝室电费</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#1a6e5c;--primary-light:#d0f0e4;--bg:#f5f6f7;--card:#fff;--text:#1a1c1b;--sub:#666;--border:#e0e0e0;--danger:#d32f2f;--danger-bg:#ffebee;--radius:12px}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);max-width:480px;margin:0 auto;min-height:100dvh;padding-bottom:70px}
header{background:var(--primary);color:#fff;padding:14px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10}
header h1{font-size:17px;flex:1}
.sync-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sync-dot.online{background:#a5f0c5}
.sync-dot.offline{background:#ffd699}
nav{display:flex;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:44px;z-index:9}
nav button{flex:1;padding:12px;border:none;background:none;font-size:14px;color:var(--sub);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
nav button.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:600}
.page{display:none;padding:14px}
.page.active{display:block}
.card{background:var(--card);border-radius:var(--radius);padding:14px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card h3{font-size:13px;color:var(--sub);margin-bottom:10px;font-weight:500}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}.stat-card .label{font-size:10px}.stat-card .value{font-size:18px}
.stat-card{background:var(--primary-light);border-radius:var(--radius);padding:12px;text-align:center}
.stat-card .label{font-size:11px;color:var(--primary)}
.stat-card .value{font-size:20px;font-weight:700;color:var(--primary);margin:2px 0}
.stat-card .sub{font-size:10px;color:var(--sub)}
input,select,button{font-family:inherit;font-size:14px}
input,select{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;background:var(--card);margin-bottom:8px}
input:focus,select:focus{border-color:var(--primary);outline:none}
.form-row{display:flex;gap:8px;margin-bottom:4px}
.form-row>*{flex:1}
.btn{padding:9px 16px;border:none;border-radius:8px;cursor:pointer;font-weight:500}
.btn:active{opacity:.8}
.btn-primary{background:var(--primary);color:#fff}
.btn-outline{background:transparent;color:var(--primary);border:1.5px solid var(--primary)}
.btn-danger{background:transparent;color:var(--danger);border:1.5px solid var(--danger)}
.btn-sm{padding:6px 12px;font-size:13px}
.btn-block{width:100%}
.record-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f0f0f0}
.record-item:last-child{border:none}
.record-avatar{width:36px;height:36px;border-radius:50%;background:var(--primary-light);display:flex;align-items:center;justify-content:center;font-weight:600;color:var(--primary);flex-shrink:0;font-size:14px}
.record-info{flex:1}
.record-info .payer{font-size:14px;font-weight:500}
.record-info .meta{font-size:11px;color:var(--sub)}
.record-amount{text-align:right}
.record-amount .money{font-size:16px;font-weight:700;color:var(--primary)}
.record-amount .kwh{font-size:11px;color:var(--sub)}
.tag{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}
.tag-ok{background:#dcedc8;color:#33691e}
.tag-pending{background:#fff9c4;color:#f57f17}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .3s;z-index:999}
#toast.show{opacity:1}
.sync-status{font-size:12px;color:var(--sub);margin-top:6px;word-break:break-all;line-height:1.5}
.payer-chip{display:inline-flex;align-items:center;gap:4px;padding:4px 8px;border-radius:12px;font-size:11px;margin:2px;cursor:pointer}
.payer-chip.active{background:var(--primary);color:#fff}
.payer-chip.normal{background:#e8e8e8;color:#333}
</style>
</head>
<body>
<header><h1>⚡ 寝室电费 v13</h1><span style="font-size:11px;opacity:.8" id="roomBadge"></span><span style="font-size:11px;opacity:.6" id="userBadge"></span><div class="sync-dot offline" id="syncDot"></div></header>
<nav><button class="active" onclick="switchPage('records',this)">记录</button><button onclick="switchPage('sync',this)">同步</button><button onclick="switchPage('settings',this)">设置</button></nav>
<div class="page active" id="page-records">
<div class="stats"><div class="stat-card"><div class="label">空调</div><div class="value" id="statAc">--</div><div class="sub">度</div></div><div class="stat-card"><div class="label">照明</div><div class="value" id="statLight">--</div><div class="sub">度</div></div><div class="stat-card"><div class="label">人均待结算</div><div class="value" id="statAvg">--</div><div class="sub" id="statAvgDetail"></div></div>
<div id="filterChips" style="padding:0 14px 8px;display:flex;flex-wrap:wrap;gap:4px;align-items:center"></div>
<div class="card" id="monthSummary"><h3>充值汇总 <span style="font-size:12px;font-weight:400;color:var(--sub)"><button onclick="prevMonth()" style="background:none;border:none;cursor:pointer;font-size:16px;padding:0 4px">◀</button><span id="monthLabel"></span><button onclick="nextMonth()" style="background:none;border:none;cursor:pointer;font-size:16px;padding:0 4px">▶</button></span></h3><div class="stats"><div class="stat-card"><div class="label">空调电费</div><div class="value" id="sumAc">--</div><div class="sub">元</div></div><div class="stat-card"><div class="label">照明电费</div><div class="value" id="sumLight">--</div><div class="sub">元</div></div><div class="stat-card"><div class="label">充值总额</div><div class="value" id="sumTotal">--</div><div class="sub" id="sumCount"></div></div></div></div>
<div class="card" id="elecBillCard" style="display:none"><h3>电费流水 <span id="elecBillCount" style="font-size:12px;color:var(--sub);font-weight:400"></span></h3><div id="elecBillList" style="max-height:300px;overflow-y:auto"></div></div>
<div class="card"><h3>添加充值记录</h3><div class="form-row"><input type="date" id="dateInput"><input type="number" id="amountInput" placeholder="金额(元)" step="0.01" min="0"></div><div id="payerChips" style="margin-bottom:8px;display:flex;flex-wrap:wrap;gap:2px"></div><button class="btn btn-primary btn-block" onclick="addRecord()">添加记录</button></div>
<div class="card"><h3>充值记录 <span id="settleBox" style="font-size:12px;color:var(--sub)"></span></h3><div id="recordList"></div><div style="display:flex;gap:8px;margin-top:8px"><button class="btn btn-outline" style="flex:1" onclick="settleAll()">结算全部</button><button class="btn btn-outline" style="flex:1" onclick="undoSettle()">撤销结算</button></div></div>
<div class="card" id="settlementSuggestion" style="display:none"><h3>结算建议</h3><div id="settlementContent"></div></div>
</div>
<div class="page" id="page-sync">
<div class="card"><h3>智慧安大登录</h3><input type="text" id="stuId" placeholder="学号"><input type="password" id="stuPwd" placeholder="密码"><label style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--sub);margin-bottom:8px"><input type="checkbox" id="rememberPwd" style="width:auto;margin:0"> 记住密码，下次自动登录</label><input type="text" id="backendUrl" placeholder="后端地址"><button class="btn btn-primary btn-block" onclick="syncLogin()">登录</button></div>
<div class="card" id="roomSelectCard" style="display:none"><h3>手动选择房间</h3><select id="syncCampus" onchange="loadBuildings()"><option>先登录</option></select><select id="syncBuilding" onchange="loadFloors()"><option>先选校区</option></select><div class="form-row"><select id="syncFloor" onchange="loadRooms()"><option>先选楼栋</option></select><select id="syncRoom" onchange="onRoomSelected()"><option>先选楼层</option></select></div><button class="btn btn-primary btn-block" id="btnJoinRoom" disabled onclick="joinRoom()">加入此房间</button></div>
<div class="card" id="roomsListCard" style="display:none"><h3>已有房间（点击加入）</h3><div id="roomsListContent" style="font-size:13px">加载中...</div></div>
<div class="card" id="roomQuickCard" style="display:none"><h3>我的房间</h3><div id="quickRoomInfo" style="font-size:14px;font-weight:500;margin-bottom:8px"></div><button class="btn btn-primary btn-block" id="btnQuickQuery" onclick="autoQueryElec()">⚡ 查询电费</button><button class="btn btn-outline btn-block" style="margin-top:6px" onclick="leaveRoom()">更换房间</button></div>
<div class="card" id="lightingRoomCard" style="display:none"><h3>照明电费房间</h3><select id="lightCampus" onchange="loadBuildingsLight()"><option>先登录</option></select><select id="lightBuilding" onchange="loadFloorsLight()"><option>先选校区</option></select><div class="form-row"><select id="lightFloor" onchange="loadRoomsLight()"><option>先选楼栋</option></select><select id="lightRoom" onchange="onLightRoomSelected()"><option>先选楼层</option></select></div><button class="btn btn-primary btn-block" id="btnSaveLighting" disabled onclick="saveLightingRoom()">保存照明房间</button><div id="lightRoomStatus" style="font-size:11px;color:var(--sub);margin-top:4px"></div></div>
<div class="card"><h3>校园卡电费提取</h3><p style="font-size:12px;color:var(--sub);margin-bottom:8px">从校园卡流水自动识别电费记录</p><button class="btn btn-primary btn-block" id="btnFetchBills" disabled onclick="fetchElectricityBills()">扫描校园卡流水</button><button class="btn btn-outline btn-block" style="margin-top:6px;font-size:12px" id="btnBillDebug" disabled onclick="debugBills()">调试：查看原始流水</button><div class="sync-status" id="billResult"></div><div id="billList"></div></div>
<div class="sync-status" id="syncResult" style="padding:6px 0"></div>
</div>
<div class="page" id="page-settings">
<div class="card"><h3>房间信息</h3><div id="roomInfo" style="font-size:13px;color:var(--sub)">加入房间后显示</div></div>
<div class="card"><h3>房间成员</h3><div id="memberList" style="font-size:13px;color:var(--sub)"></div></div>
<div class="card"><h3>电价 (元/度)</h3><div class="form-row"><input type="number" id="priceInput" value="0.56" step="0.01" min="0"><button class="btn btn-outline" onclick="savePrice()">保存</button></div></div>
<div class="card"><h3>导出</h3><button class="btn btn-outline btn-block" onclick="exportJSON()">导出 JSON</button><button class="btn btn-outline btn-block" style="margin-top:6px" onclick="exportCSV()">导出 CSV</button></div>
</div>
<div id="toast"></div>
<script>
var syncToken="",syncBackend=window.location.origin||localStorage.getItem("ac_backend")||"http://localhost:5001";
var records=[],roomId=null,roomMembers=[],myStudentId="",myName="",selectedPayer="";
var pricePerKwh=parseFloat(localStorage.getItem("ac_price")||"0.56");
var lastKwh=null,lastRoomInfo="",roomCampus="";
function api(u,d){return fetch(syncBackend+u,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(d||{})}).then(function(r){var ct=r.headers.get("content-type")||"";if(r.status===401){switchPage("sync");document.getElementById("syncResult").textContent="会话过期，请重新登录";syncToken="";return Promise.reject(new Error("session expired"))}if(ct.indexOf("json")===-1)throw new Error("Server error: "+r.status);return r.json()})}
function switchPage(n,b){document.querySelectorAll(".page").forEach(function(p){p.classList.remove("active")});document.querySelectorAll("nav button").forEach(function(x){x.classList.remove("active")});document.getElementById("page-"+n).classList.add("active");if(b)b.classList.add("active");if(n==="records"){if(!syncToken){tryAutoLogin()}else{summaryYear=new Date().getFullYear();summaryMonth=new Date().getMonth()+1;updateMonthLabel();loadRecords();loadSummary();if(syncToken&&roomId){autoQueryElec()}}}if(n==="settings")loadRoomInfo()}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function toast(m){var e=document.getElementById("toast");e.textContent=m;e.classList.add("show");clearTimeout(window._tt);window._tt=setTimeout(function(){e.classList.remove("show")},1800)}
function log(m){var e=document.getElementById("syncResult");e.textContent=(e.textContent||"")+" | "+m.slice(0,100)}

// ==== Records ====
function loadRecords(){if(!syncToken||!roomId)return;var p={token:syncToken};if(summaryYear!=null)p.year=summaryYear;if(summaryMonth!=null)p.month=summaryMonth;api("/api/records",p).then(function(j){if(!j.error){records=j.records||[];renderAll()}})}
function selectPayer(n){selectedPayer=n;document.querySelectorAll("#payerChips .payer-chip").forEach(function(c){c.className="payer-chip "+(c.textContent.trim()===n?"active":"normal")})}
function renderPayerChips(){var n=roomMembers.length>0?roomMembers.map(function(m){return m.name}):["室友A","室友B","室友C","室友D"];if(!selectedPayer)selectedPayer=n[0];document.getElementById("payerChips").innerHTML=n.map(function(x){return '<span class="payer-chip '+(x===selectedPayer?"active":"normal")+'" onclick="selectPayer(\''+esc(x)+'\')">'+esc(x)+"</span>"}).join("")}
function addRecord(){if(!roomId){toast("请先加入房间");return}var d=document.getElementById("dateInput").value,a=parseFloat(document.getElementById("amountInput").value);if(!d||!a||a<=0){toast("请填写日期和金额");return}var kwh=pricePerKwh>0?parseFloat((a/pricePerKwh).toFixed(2)):0;api("/api/records/add",{token:syncToken,date:d,amount:a,payer:selectedPayer,kwh:kwh}).then(function(j){if(j.error){toast(j.error);return}loadRecords();loadSummary();document.getElementById("amountInput").value="";toast("已添加")})}
function deleteRecord(id){if(!confirm("确认删除？"))return;api("/api/records/delete",{token:syncToken,id:id}).then(function(){loadRecords();loadSummary();toast("已删除")})}
function settleAll(){var u=records.filter(function(r){return!r.settled});if(!u.length){toast("没有待结算记录");return}if(!confirm("结算全部 "+u.length+" 条？"))return;api("/api/records/settle",{token:syncToken,ids:u.map(function(r){return r.id})}).then(function(){loadRecords();toast("已结算")})}
function undoSettle(){if(!confirm("撤销最近结算？"))return;api("/api/records/undo_settle",{token:syncToken}).then(function(){loadRecords();toast("已撤销")})}
var filterPayer="";
function setFilterPayer(n){filterPayer=n;renderRecords();renderSuggestion();renderFilterChips()}
function renderFilterChips(){var e=document.getElementById("filterChips");if(!e)return;var names=[];roomMembers.forEach(function(m){names.push(m.name)});records.forEach(function(r){if(r.payer_name&&names.indexOf(r.payer_name)<0)names.push(r.payer_name)});if(names.length<=1){e.innerHTML="";return}var h="";h+='<span class="payer-chip '+(filterPayer==""?"active":"normal")+'" onclick="setFilterPayer(&quot;&quot;)" style="cursor:pointer">全部</span>';names.forEach(function(x){h+='<span class="payer-chip '+(filterPayer===x?"active":"normal")+'" onclick="setFilterPayer(&quot;'+esc(x)+'&quot;)" style="cursor:pointer">'+esc(x)+'</span>'});e.innerHTML=h}function renderRecords(){var e=document.getElementById("recordList");if(!e)return;var filtered=filterPayer?records.filter(function(r){return r.payer_name===filterPayer}):records;if(!filtered.length){e.innerHTML='<div style="text-align:center;color:var(--sub);padding:20px">暂无记录</div>';return}var s=filtered.slice().sort(function(a,b){return b.id-a.id});e.innerHTML=s.map(function(r){var t=r.settled?'<span class="tag tag-ok">已结</span>':'<span class="tag tag-pending">待结</span>';var kh=r.kwh?('<div class="kwh">'+r.kwh.toFixed(1)+' 度</div>'):"";var et="";if(r.elec_type==="空调电费")et=' <span style="font-size:9px;color:#0288d1">空调</span>';else if(r.elec_type==="照明电费")et=' <span style="font-size:9px;color:#f57c00">照明</span>';var sc=r.source==="campus_card"?' <span style="font-size:9px;color:#999">[卡]</span>':"";return '<div class="record-item"><div class="record-avatar">'+esc((r.payer_name||"?")[0])+'</div><div class="record-info"><div class="payer">'+esc(r.payer_name||"?")+" "+t+et+sc+'</div><div class="meta">'+esc(r.date||"")+'</div></div><div class="record-amount"><div class="money">¥'+Number(r.amount||0).toFixed(2)+"</div>"+kh+'</div><button class="btn btn-danger btn-sm" onclick="deleteRecord('+r.id+')" style="padding:2px 8px;font-size:11px">删</button></div>'}).join("");var b=document.getElementById("settleBox");if(b){var u=filtered.filter(function(r){return!r.settled});b.textContent=u.length?"（"+u.length+"条待结算）":""};renderSuggestion()}
function renderSuggestion(){var e=document.getElementById("settlementSuggestion"),c=document.getElementById("settlementContent");if(!e||!c)return;var src=filterPayer?records.filter(function(r){return r.payer_name===filterPayer}):records;var u=src.filter(function(r){return!r.settled});if(!u.length){e.style.display="none";return}var n=roomMembers.map(function(m){return m.name});if(!n.length){var ns={};records.forEach(function(r){if(r.payer_name)ns[r.payer_name]=true});n=Object.keys(ns)}if(!n.length)n=["室友A","室友B","室友C","室友D"];var nm=n.length,t={};n.forEach(function(x){t[x]=0});u.forEach(function(r){t[r.payer_name]=(t[r.payer_name]||0)+r.amount});var ta=u.reduce(function(s,r){return s+r.amount},0),pp=ta/nm,topPayer="",topPaid=0;n.forEach(function(x){if((t[x]||0)>topPaid){topPaid=t[x]||0;topPayer=x}});var h='<div style="font-size:13px;margin-bottom:4px">总金额: ¥'+ta.toFixed(2)+' | 人均: ¥'+pp.toFixed(2)+' | 基准人: <b>'+esc(topPayer)+'</b> (¥'+topPaid.toFixed(2)+')</div>';n.forEach(function(x){if(x===topPayer)return;var p=t[x]||0,d=pp-p;if(d<0.01){h+='<div style="font-size:12px;color:var(--sub)">'+esc(x)+': 已平版</div>'}else{h+='<div style="font-size:13px;padding:2px 0;color:var(--danger)">'+esc(x)+' → '+esc(topPayer)+' ¥'+d.toFixed(2)+'</div>'}});c.innerHTML=h;e.style.display="block"}
function renderStats(acKwh,ltKwh){
if(acKwh!==undefined)document.getElementById("statAc").textContent=acKwh!=null?acKwh.toFixed(2):"--";
if(ltKwh!==undefined)document.getElementById("statLight").textContent=ltKwh!=null?ltKwh.toFixed(2):"--";
var u=records.filter(function(r){return!r.settled}),n=roomMembers.length||4,t=u.reduce(function(s,r){return s+r.amount},0);
document.getElementById("statAvg").textContent="¥"+(t/n).toFixed(2);
document.getElementById("statAvgDetail").textContent=u.length+"条待结/ "+n+"人";
document.getElementById("roomBadge").textContent=lastRoomInfo||"";
document.getElementById("userBadge").textContent=myName?" "+myName:"";
document.getElementById("syncDot").className="sync-dot "+(syncToken?"online":"offline")
}

var summaryYear=new Date().getFullYear(),summaryMonth=new Date().getMonth()+1;
function updateMonthLabel(){if(summaryYear==null){document.getElementById("monthLabel").textContent="全部";return}document.getElementById("monthLabel").textContent=summaryYear+"年"+summaryMonth+"月"}
function prevMonth(){if(summaryYear==null){summaryYear=new Date().getFullYear();summaryMonth=new Date().getMonth()+1}summaryMonth--;if(summaryMonth<1){summaryMonth=12;summaryYear--}updateMonthLabel();loadRecords();loadSummary()}
function nextMonth(){var n=new Date();if(summaryYear==null){summaryYear=n.getFullYear();summaryMonth=n.getMonth()+1;updateMonthLabel();loadRecords();loadSummary();return}if(summaryYear===n.getFullYear()&&summaryMonth===n.getMonth()+1)return;summaryMonth++;if(summaryMonth>12){summaryMonth=1;summaryYear++}updateMonthLabel();loadRecords();loadSummary()}
function loadSummary(){var y=summaryYear!=null?summaryYear:new Date().getFullYear(),m=summaryMonth!=null?summaryMonth:new Date().getMonth()+1;updateMonthLabel();if(!syncToken||!roomId){document.getElementById("sumAc").textContent="--";document.getElementById("sumLight").textContent="--";document.getElementById("sumTotal").textContent="--";document.getElementById("sumCount").textContent="未登录";return}api("/api/records/summary",{token:syncToken,year:y,month:m}).then(function(j){if(j.error){document.getElementById("sumAc").textContent="--";document.getElementById("sumLight").textContent="--";document.getElementById("sumTotal").textContent="--";document.getElementById("sumCount").textContent=j.error;return}document.getElementById("sumAc").textContent="¥"+j.ac_total.toFixed(2);document.getElementById("sumLight").textContent="¥"+j.lighting_total.toFixed(2);document.getElementById("sumTotal").textContent="¥"+j.grand_total.toFixed(2);document.getElementById("sumCount").textContent=j.count+"条记录"}).catch(function(e){document.getElementById("sumAc").textContent="--";document.getElementById("sumLight").textContent="--";document.getElementById("sumTotal").textContent="--";document.getElementById("sumCount").textContent="ERR"})}
function renderAll(){renderPayerChips();renderFilterChips();renderRecords();renderStats();loadSummary()}

// ==== Sync / Login ====
function tryAutoLogin(){
  var su=localStorage.getItem("ac_saved_user"),sp=localStorage.getItem("ac_saved_pwd");
  if(!su||!sp)return;
  document.getElementById("stuId").value=su;
  document.getElementById("stuPwd").value=atob(sp);
  document.getElementById("rememberPwd").checked=true;
  document.getElementById("syncResult").textContent="自动登录中...";
  syncLogin();
}
function syncLogin(){var b=document.getElementById("backendUrl").value.trim();var u=document.getElementById("stuId").value.trim(),p=document.getElementById("stuPwd").value.trim();var r=document.getElementById("syncResult");if(!u||!p){r.textContent="请输入学号和密码";return}r.textContent="登录中...";syncBackend=b;localStorage.setItem("ac_backend",b);
fetch(b+"/api/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:u,password:p})})
.then(function(x){return x.json()}).then(function(j){
if(j.error){r.textContent="ERROR: "+j.error;return}
syncToken=j.token;myStudentId=j.student_id||u;myName=myStudentId;
localStorage.setItem("ac_sync_token",syncToken);
if(document.getElementById("rememberPwd").checked){localStorage.setItem("ac_saved_user",stuId);localStorage.setItem("ac_saved_pwd",btoa(stuPwd))}else{localStorage.removeItem("ac_saved_user");localStorage.removeItem("ac_saved_pwd")}
document.getElementById("syncDot").className="sync-dot online";
document.getElementById("stuPwd").value="";
document.getElementById("btnBillDebug").disabled=false;
// Try auto-join
r.textContent="OK "+myStudentId+" 查找房间...";
fetch(b+"/api/room/my",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({token:syncToken})})
.then(function(x2){return x2.json()}).then(function(rm){
if(rm.has_room){roomCampus=rm.campus||"";onRoomJoined(rm.room_id,rm.members,rm.building_name+" "+rm.room_name)}
else{r.textContent="OK 登录成功，请选择房间加入";document.getElementById("roomQuickCard").style.display="none";
document.getElementById("lightingRoomCard").style.display="none";loadCampuses()}
}).catch(function(e){r.textContent="OK 登录成功，请选择房间加入";document.getElementById("roomsListCard").style.display="";loadRoomsList();loadCampuses()});
}).catch(function(e){r.textContent="Failed to fetch: "+e.message})}

function loadRoomsList(){var e=document.getElementById("roomsListContent");if(!syncToken){e.textContent="\u5148\u767b\u5f55";return}e.textContent="\u52a0\u8f7d\u4e2d...";api("/api/rooms/list",{token:syncToken}).then(function(j){if(j.error||!j.rooms||!j.rooms.length){e.textContent="\u6682\u65e0\u5df2\u6709\u623f\u95f4";return}var h="";j.rooms.forEach(function(r){h+='<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f0f0f0"><span>'+esc(r.room_name)+' ('+r.member_count+'\u4eba)</span><button class="btn btn-sm btn-outline" onclick="joinRoomById('+r.id+',&quot;'+esc(r.room_name)+'&quot;)">\u52a0\u5165</button></div>'});e.innerHTML=h||"\u6682\u65e0\u5df2\u6709\u623f\u95f4"}).catch(function(){e.textContent="\u52a0\u8f7d\u5931\u8d25"})}
function loadCampuses(){var s=document.getElementById("syncCampus");if(!syncToken){s.innerHTML="<option>先登录</option>";return}s.innerHTML="<option>加载中...</option>";api("/api/feeitem/select",{token:syncToken,feeitemid:"488",level:"0"}).then(function(j){if(j.error||!j.options){s.innerHTML="<option>"+(j.error||"无数据")+"</option>";return}s.innerHTML='<option value="">选择校区</option>'+j.options.map(function(o){return '<option value="'+esc(o.id)+'">'+esc(o.name)+"</option>"}).join("")}).catch(function(){s.innerHTML="<option>加载失败</option>"})}
function loadBuildings(){var c=document.getElementById("syncCampus").value,s=document.getElementById("syncBuilding");if(!c)return;s.innerHTML="<option>加载中...</option>";api("/api/feeitem/select",{token:syncToken,feeitemid:"488",level:"1",campus:c}).then(function(j){if(j.error){s.innerHTML="<option>"+j.error+"</option>";return}s.innerHTML='<option value="">选择楼栋</option>'+j.options.map(function(o){return '<option value="'+esc(o.id)+'">'+esc(o.name)+"</option>"}).join("")})}
function loadFloors(){var c=document.getElementById("syncCampus").value,b=document.getElementById("syncBuilding").value,s=document.getElementById("syncFloor");if(!b)return;s.innerHTML="<option>加载中...</option>";api("/api/feeitem/select",{token:syncToken,feeitemid:"488",level:"2",campus:c,building:b}).then(function(j){if(j.error){s.innerHTML="<option>"+j.error+"</option>";return}s.innerHTML='<option value="">选择楼层</option>'+j.options.map(function(o){return '<option value="'+esc(o.id)+'">'+esc(o.name)+"</option>"}).join("");document.getElementById("syncRoom").innerHTML="<option>先选楼层</option>"})}
function loadRooms(){var c=document.getElementById("syncCampus").value,b=document.getElementById("syncBuilding").value,f=document.getElementById("syncFloor").value,s=document.getElementById("syncRoom");if(!f)return;s.innerHTML="<option>加载中...</option>";api("/api/feeitem/select",{token:syncToken,feeitemid:"488",level:"3",campus:c,building:b,floor:f}).then(function(j){if(j.error){s.innerHTML="<option>"+j.error+"</option>";return}if(!j.options||!j.options.length){s.innerHTML="<option>无房间</option>";return}s.innerHTML='<option value="">选择房间</option>'+j.options.map(function(o){return '<option value="'+esc(o.id)+'">'+esc(o.name)+"</option>"}).join("");document.getElementById("btnJoinRoom").disabled=false})}
function onRoomSelected(){var s=document.getElementById("syncRoom");document.getElementById("btnJoinRoom").disabled=!s.value}

function joinRoom(){var c=document.getElementById("syncCampus").value,b=document.getElementById("syncBuilding").value,f=document.getElementById("syncFloor").value,r=document.getElementById("syncRoom").value;var rn=document.getElementById("syncRoom").selectedOptions[0]?document.getElementById("syncRoom").selectedOptions[0].text:"";var nm=prompt("你的名字（室友能看到）：",myStudentId);if(!nm)return;myName=nm;
api("/api/room/join",{token:syncToken,campus:c,building:b,floor:f,room:r,roomName:rn,name:nm}).then(function(j){
if(j.error){log("ERROR: "+j.error);return}
onRoomJoined(j.room_id,j.members||[],j.room_name);
}).catch(function(e){log("ERROR: "+e.message)})}

function onRoomJoined(rid,members,buildingRoom){
roomId=rid;roomMembers=members||[];
lastRoomInfo=buildingRoom;
// Show quick card, hide select card
document.getElementById("roomSelectCard").style.display="none";
document.getElementById("roomQuickCard").style.display="";
document.getElementById("lightingRoomCard").style.display="";
// Load lighting building options
loadBuildingsLight();
document.getElementById("quickRoomInfo").textContent="🏠 "+buildingRoom+" | "+roomMembers.length+"人 | "+roomMembers.map(function(m){return m.name}).join("、");
document.getElementById("btnFetchBills").disabled=false;
document.getElementById("syncResult").textContent="OK "+myName+" 已加入 "+buildingRoom;
loadRecords();loadRoomInfo();renderAll();autoQueryElec();
setTimeout(tryAutoLogin, 500);
}

function leaveRoom(){
if(!confirm("更换房间需要重新登录，确定？"))return;
syncToken="";localStorage.removeItem("ac_sync_token");
roomId=null;roomMembers=[];
document.getElementById("syncDot").className="sync-dot offline";

document.getElementById("roomQuickCard").style.display="none";
document.getElementById("lightingRoomCard").style.display="none";
document.getElementById("btnFetchBills").disabled=true;
document.getElementById("syncResult").textContent="已退出，请重新登录";
renderAll();
setTimeout(tryAutoLogin, 500);
}

// ==== Lighting Room ====
function loadBuildingsLight(){
  var cs=document.getElementById("lightCampus"),bs=document.getElementById("lightBuilding");
  var mcv=roomCampus||document.getElementById("syncCampus").value;
  if(!syncToken||!mcv){cs.innerHTML="<option>先登录</option>";bs.innerHTML="<option>先登录</option>";return}
  // Parse campus code&name
  var parts=mcv.split("&"),cid=parts[0]||mcv,cname=parts[1]||cid;
  cs.innerHTML='<option value="'+esc(cid)+'">'+esc(cname)+"</option>";
  bs.innerHTML="<option>加载中...</option>";
  api("/api/feeitem/select",{token:syncToken,feeitemid:"488",level:"1",campus:cid}).then(function(j){
    if(j.error||!j.options){bs.innerHTML="<option>"+(j.error||"无数据")+"</option>";return}
    var filtered=j.options.filter(function(o){return o.name.indexOf("照明")>=0});
    if(!filtered.length){bs.innerHTML="<option>未找到照明楼栋</option>";return}
    bs.innerHTML='<option value="">选择照明楼栋</option>'+filtered.map(function(o){return '<option value="'+esc(o.id)+'">'+esc(o.name)+"</option>"}).join("")
  }).catch(function(){bs.innerHTML="<option>加载失败</option>"})
}
function loadFloorsLight(){
  var b=document.getElementById("lightBuilding").value,s=document.getElementById("lightFloor");
  if(!b)return;s.innerHTML="<option>加载中...</option>";
  var cv=roomCampus||document.getElementById("syncCampus").value;
  api("/api/feeitem/select",{token:syncToken,feeitemid:"488",level:"2",campus:cv.split("&")[0],building:b}).then(function(j){
    if(j.error){s.innerHTML="<option>"+j.error+"</option>";return}
    s.innerHTML='<option value="">选择楼层</option>'+j.options.map(function(o){return '<option value="'+esc(o.id)+'">'+esc(o.name)+"</option>"}).join("");
    document.getElementById("lightRoom").innerHTML="<option>先选楼层</option>"
  })
}
function loadRoomsLight(){
  var c=(roomCampus||document.getElementById("syncCampus").value).split("&")[0],b=document.getElementById("lightBuilding").value,f=document.getElementById("lightFloor").value,s=document.getElementById("lightRoom");
  if(!f)return;s.innerHTML="<option>加载中...</option>";
  api("/api/feeitem/select",{token:syncToken,feeitemid:"488",level:"3",campus:c,building:b,floor:f}).then(function(j){
    if(j.error){s.innerHTML="<option>"+j.error+"</option>";return}
    if(!j.options||!j.options.length){s.innerHTML="<option>无房间</option>";return}
    s.innerHTML='<option value="">选择房间</option>'+j.options.map(function(o){return '<option value="'+esc(o.id)+'">'+esc(o.name)+"</option>"}).join("");
    document.getElementById("btnSaveLighting").disabled=false
  })
}
function onLightRoomSelected(){
  document.getElementById("btnSaveLighting").disabled=!document.getElementById("lightRoom").value
}
function saveLightingRoom(){
  var b=document.getElementById("lightBuilding").value,f=document.getElementById("lightFloor").value,r=document.getElementById("lightRoom").value;
  var st=document.getElementById("lightRoomStatus");
  if(!b||!f||!r){st.textContent="请完整选择";return}
  st.textContent="保存中...";
  api("/api/room/lighting",{token:syncToken,building:b,floor:f,room:r}).then(function(j){
    if(j.error){st.textContent="ERROR: "+j.error;return}
    st.textContent="✔ 照明房间已保存";
    autoQueryElec()
  }).catch(function(e){st.textContent="ERROR: "+e.message})
}

function autoQueryElec(){
var r=document.getElementById("syncResult");r.textContent="查询中...";
api("/api/electricity/auto",{token:syncToken}).then(function(j){
if(j.error){r.textContent="ERROR: "+j.error;return}
var ac=j.ac||{},lt=j.lighting||{},ak=ac.kwh,lk=lt.kwh;
var aks=ak!=null?ak.toFixed(2):"--",lks=lk!=null?lk.toFixed(2):"--";
r.textContent=lastRoomInfo+" | 空调:"+aks+" 照明:"+lks;
lastKwh=ak;localStorage.setItem("ac_last_kwh",ak);
renderStats(ak,lk);
var note=j.note||"";
if(note)document.getElementById("lightRoomStatus").textContent=note;
}).catch(function(e){r.textContent="ERROR: "+e.message})
}

function loadRoomInfo(){
if(!roomId){document.getElementById("roomInfo").textContent="尚未加入房间";document.getElementById("memberList").textContent="";return}
api("/api/room/info",{token:syncToken}).then(function(j){
if(j.error)return;
roomMembers=j.members||[];
document.getElementById("roomInfo").textContent=(j.room||{}).building_name+" "+(j.room||{}).room_name+" | "+roomMembers.length+"人";
document.getElementById("memberList").innerHTML=roomMembers.map(function(m){return '<div>'+esc(m.name)+' ('+esc(m.student_id)+')</div>'}).join("");
renderAll();
setTimeout(tryAutoLogin, 500);
});
}

function fetchElectricityBills(){var r=document.getElementById("billResult"),l=document.getElementById("billList");r.textContent="扫描中...";l.innerHTML="";document.getElementById("btnFetchBills").disabled=true;
api("/api/bills/import",{token:syncToken}).then(function(j){
document.getElementById("btnFetchBills").disabled=false;if(j.error){r.textContent="ERROR: "+j.error;return}
r.textContent="导入完成！新增 "+j.imported+" 条，跳过 "+j.skipped+" 条已存在的记录";
l.innerHTML="";
summaryYear=new Date().getFullYear();summaryMonth=new Date().getMonth()+1;
loadRecords();loadSummary();
document.getElementById("elecBillCard").style.display="none";
}).catch(function(e){document.getElementById("btnFetchBills").disabled=false;r.textContent="ERROR: "+e.message})}
function billRow(b,i,n){var a=b.amount.toFixed(2),t=b.type==="照明电费"?"照明":b.type==="空调电费"?"空调":"电费",d=(b.date||"").slice(0,10);return '<div class="record-item"><div class="record-info"><div>'+t+" ¥"+esc(a)+'</div><div class="meta">'+esc(d)+" "+esc(b.merchant||"")+'</div></div>'+(n?'<button class="btn btn-sm btn-outline" onclick="importBill('+i+')">导入</button>':'<span style="font-size:10px;color:#999">已导入</span>')+"</div>"}
function importBill(i){var b=window._tempBills[i];if(!b)return;var p=prompt("充值人：",myName||"");if(!p)return;var d=(b.date||"").slice(0,10);api("/api/records/add",{token:syncToken,date:d,amount:b.amount,payer:p,kwh:pricePerKwh>0?parseFloat((b.amount/pricePerKwh).toFixed(2)):0,source:"campus_card",elecType:b.type}).then(function(){loadRecords();loadSummary();toast("已导入")})}
function importAllBills(){var b=window._tempBills;if(!b||!b.length){toast("没有新记录");return}var c=b.length,d=0;b.forEach(function(x){var dt=(x.date||"").slice(0,10);api("/api/records/add",{token:syncToken,date:dt,amount:x.amount,payer:myName||"?",kwh:pricePerKwh>0?parseFloat((x.amount/pricePerKwh).toFixed(2)):0,source:"campus_card",elecType:x.type}).then(function(){d++;if(d>=c){loadRecords();loadSummary();toast("已导入 "+c+" 条")}})});document.getElementById("billList").innerHTML="";document.getElementById("billResult").textContent="导入中..."}
function debugBills(){var r=document.getElementById("billResult"),l=document.getElementById("billList");r.textContent="获取中...";l.innerHTML="";api("/api/bills/debug",{token:syncToken}).then(function(j){if(j.error){r.textContent="ERROR: "+j.error;return}r.textContent="共 "+j.total_scanned+" 条样本";l.innerHTML='<pre style="font-size:10px;max-height:400px;overflow:auto;background:#f5f5f5;padding:8px;border-radius:8px">'+esc(JSON.stringify(j,null,2))+"</pre>"})}
