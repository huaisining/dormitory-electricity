<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a6e5c">
<title>寝室电费</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#1a6e5c;--primary-light:#d0f0e4;--bg:#f5f6f7;--card:#fff;--text:#1a1c1b;--sub:#666;--border:#e0e0e0;--danger:#d32f2f;--danger-bg:#ffebee;--radius:12px}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);max-width:480px;margin:0 auto;min-height:100dvh;padding-bottom:70px}
header{background:var(--primary);color:#fff;padding:14px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10}
header h1{font-size:17px;flex:1}
.sync-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sync-dot.online{background:#a5f0c5}
.sync-dot.offline{background:#ffd699}
nav{display:flex;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:44px;z-index:9}
nav button{flex:1;padding:12px;border:none;background:none;font-size:14px;color:var(--sub);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
nav button.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:600}
.page{display:none;padding:14px}
.page.active{display:block}
.card{background:var(--card);border-radius:var(--radius);padding:14px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card h3{font-size:13px;color:var(--sub);margin-bottom:10px;font-weight:500}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.stat-card{background:var(--primary-light);border-radius:var(--radius);padding:12px;text-align:center}
.stat-card .label{font-size:11px;color:var(--primary)}
.stat-card .value{font-size:20px;font-weight:700;color:var(--primary);margin:2px 0}
.stat-card .sub{font-size:10px;color:var(--sub)}
input,select,button{font-family:inherit;font-size:14px}
input,select{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;background:var(--card);margin-bottom:8px}
input:focus,select:focus{border-color:var(--primary);outline:none}
.form-row{display:flex;gap:8px;margin-bottom:4px}
.form-row>*{flex:1}
.form-row .sm{flex:0 0 80px}
.btn{padding:9px 16px;border:none;border-radius:8px;cursor:pointer;font-weight:500;transition:opacity .15s}
.btn:active{opacity:.8}
.btn-primary{background:var(--primary);color:#fff}
.btn-outline{background:transparent;color:var(--primary);border:1.5px solid var(--primary)}
.btn-danger{background:transparent;color:var(--danger);border:1.5px solid var(--danger)}
.btn-sm{padding:6px 12px;font-size:13px}
.btn-block{width:100%}
.record-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f0f0f0}
.record-item:last-child{border:none}
.record-avatar{width:36px;height:36px;border-radius:50%;background:var(--primary-light);display:flex;align-items:center;justify-content:center;font-weight:600;color:var(--primary);flex-shrink:0;font-size:14px}
.record-info{flex:1}
.record-info .payer{font-size:14px;font-weight:500}
.record-info .meta{font-size:11px;color:var(--sub)}
.record-amount{text-align:right}
.record-amount .money{font-size:16px;font-weight:700;color:var(--primary)}
.record-amount .kwh{font-size:11px;color:var(--sub)}
.chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:16px;font-size:12px;background:#f0f0f0;margin:2px}
.chip .del{width:16px;height:16px;border-radius:50%;border:none;background:var(--danger-bg);color:var(--danger);cursor:pointer;font-size:10px;line-height:1}
.tag{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}
.tag-ok{background:#dcedc8;color:#33691e}
.tag-pending{background:#fff9c4;color:#f57f17}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .3s;z-index:999}
#toast.show{opacity:1}
.sync-status{font-size:12px;color:var(--sub);margin-top:6px;word-break:break-all;line-height:1.5}
.payer-chip{display:inline-flex;align-items:center;gap:4px;padding:4px 8px;border-radius:12px;font-size:11px;margin:2px;cursor:pointer}
.payer-chip.active{background:var(--primary);color:#fff}
.payer-chip.normal{background:#e8e8e8;color:#333}
</style>
</head>
<body>
<header><h1>⚡ 寝室电费</h1><span style="font-size:11px;opacity:.8" id="roomBadge"></span><span style="font-size:11px;opacity:.6" id="userBadge"></span><div class="sync-dot offline" id="syncDot"></div></header>
<nav><button class="active" onclick="switchPage('records',this)">记录</button><button onclick="switchPage('sync',this)">同步</button><button onclick="switchPage('settings',this)">设置</button></nav>
